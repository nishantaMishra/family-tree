<!DOCTYPE html>
<html lang="hi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miśrā Family Chart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f5f0;
            --surface: #ffffff;
            --accent: #5b4fcf;
            --accent-light: #eeebfc;
            --text: #1a1a2a;
            --text-muted: #6b6b80;
            --link-color: #b0a8d8;
            --header-bg: rgba(255,255,255,0.92);
            --header-border: rgba(91,79,207,0.12);
            --node-fill: #ffffff;
            --node-collapsed: #5b4fcf;
            --node-stroke: #5b4fcf;
            --node-highlight: #e96c2f;
            --shadow: rgba(91,79,207,0.10);
            --shadow-sm: rgba(0,0,0,0.06);
            --dropdown-shadow: 0 8px 28px rgba(0,0,0,0.14);
            --bottombar-bg: #ffffff;
            --bottombar-border: rgba(91,79,207,0.15);
            --input-bg: #f2f0fc;
            --input-border: rgba(91,79,207,0.25);
            --male-color: #5b4fcf;
            --female-color: #e91e63;
        }
        [data-theme="dark"] {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --accent: #8b7fe8;
            --accent-light: #25224a;
            --text: #e4e4f0;
            --text-muted: #8888a0;
            --link-color: #30285c;
            --header-bg: rgba(15,15,26,0.93);
            --header-border: rgba(139,127,232,0.18);
            --node-fill: #1a1a2e;
            --node-collapsed: #7c6fe0;
            --node-stroke: #8b7fe8;
            --node-highlight: #f0824a;
            --shadow: rgba(139,127,232,0.18);
            --shadow-sm: rgba(0,0,0,0.35);
            --dropdown-shadow: 0 8px 28px rgba(0,0,0,0.50);
            --bottombar-bg: #1a1a2e;
            --bottombar-border: rgba(139,127,232,0.20);
            --input-bg: #14132a;
            --input-border: rgba(139,127,232,0.35);
            --male-color: #8b7fe8;
            --female-color: #f06292;
        }
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            transition: background-color 0.3s, color 0.3s;
        }
        body {
            font-family: 'Noto Sans Devanagari', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        #header {
            position: relative;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 24px;
            height: 58px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--header-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            flex-shrink: 0;
            box-shadow: 0 1px 8px var(--shadow);
        }
        #header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
            letter-spacing: 0.01em;
        }

        /* ── Search ── */
        #search-wrapper {
            position: relative;
            flex: 1;
            max-width: 380px;
            margin: 0 auto;
        }
        #search-input {
            width: 100%;
            padding: 8px 38px 8px 14px;
            border-radius: 22px;
            border: 1.5px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text);
            font-family: 'Noto Sans Devanagari', Arial, sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--shadow);
        }
        #search-input::placeholder {
            color: var(--text-muted);
            font-size: 13px;
        }
        #search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
        }
        #search-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            min-width: 240px;
            background: var(--surface);
            border: 1px solid var(--input-border);
            border-radius: 14px;
            box-shadow: var(--dropdown-shadow);
            overflow: hidden;
            max-height: 260px;
            overflow-y: auto;
            z-index: 300;
        }
        #search-dropdown.open {
            display: block;
        }
        .search-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 13.5px;
            color: var(--text);
            border-bottom: 1px solid var(--header-border);
            transition: background 0.12s;
        }
        .search-item:last-child {
            border-bottom: none;
        }
        .search-item:hover {
            background: var(--accent-light);
        }
        .search-item-path {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .search-empty {
            padding: 14px 16px;
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
        }

        /* ── Theme toggle ── */
        #theme-toggle {
            flex-shrink: 0;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: 22px;
            padding: 5px 13px;
            cursor: pointer;
            font-size: 15px;
            color: var(--text);
            transition: border-color 0.2s, transform 0.12s;
            line-height: 1.6;
        }
        #theme-toggle:hover {
            border-color: var(--accent);
            transform: scale(1.06);
        }

        /* ── Tree container ── */
        #tree-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: var(--bg);
            transition: background-color 0.3s;
        }
        .tree-panel {
            position: relative;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }
        #tree-svg {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        #tree-svg:active {
            cursor: grabbing;
        }
        #spouse-connector-layer {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 950;
        }
        .connector-path {
            fill: none;
            stroke: var(--node-highlight);
            stroke-width: 2.2px;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            filter: drop-shadow(0 0 6px var(--shadow));
        }
        .spouse-tree-link {
            fill: none;
            stroke: var(--node-highlight);
            stroke-opacity: 0.55;
            stroke-width: 1.7px;
            stroke-dasharray: 4 4;
        }

        /* ── D3 nodes & links ── */
        .node {
            cursor: pointer;
        }
        .node circle {
            stroke-width: 2.5px;
            transition: transform 0.3s ease, cy 0.3s ease;
        }
        .spouse-label {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-4px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .node:hover .spouse-circle {
            cy: 24; /* Touching: spacing of 2R if R=12 */
        }
        .node:hover .spouse-label {
            opacity: 1;
            transform: translateY(0);
        }
        @media (max-width: 420px) {
            .node:hover .spouse-circle { cy: 20; }
        }
        @media (min-width: 421px) and (max-width: 768px) {
            .node:hover .spouse-circle { cy: 22; }
        }
        .node text {
            font: 13px 'Noto Sans Devanagari', Arial, sans-serif;
            pointer-events: none;
        }
        .link {
            fill: none;
            stroke-opacity: 0.45;
            stroke-width: 1.5px;
        }

        /* ── Search highlight ── */
        .node--highlighted circle {
            stroke-width: 4px !important;
            animation: pulse 1.6s ease-in-out 3;
        }
        @keyframes pulse {
            0%   { filter: drop-shadow(0 0 0 transparent); }
            50%  { filter: drop-shadow(0 0 9px var(--node-highlight)); }
            100% { filter: drop-shadow(0 0 0 transparent); }
        }

        /* ── Bottom panel ── */
        #bottombar {
            flex-shrink: 0;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: var(--bottombar-bg);
            border-top: 1px solid var(--bottombar-border);
            box-shadow: 0 -4px 18px var(--shadow);
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.35s ease, padding 0.3s ease, opacity 0.3s;
        }
        #bottombar.visible {
            max-height: 148px;
            padding: 14px 24px;
            opacity: 1;
        }
        #bottombar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        #bottombar-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
        }
        .bottombar-spouse-trigger {
            background: none;
            border: none;
            padding: 0;
            margin: 0;
            color: inherit;
            font: inherit;
            font-weight: inherit;
            cursor: pointer;
            text-decoration: underline;
            text-decoration-thickness: 1.5px;
            text-underline-offset: 0.14em;
        }
        .bottombar-spouse-trigger:hover,
        .bottombar-spouse-trigger.is-active {
            color: var(--node-highlight);
        }
        .bottombar-spouse-trigger:focus-visible {
            outline: 2px solid var(--node-highlight);
            outline-offset: 2px;
            border-radius: 4px;
        }
        #bottombar-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
            line-height: 1;
        }
        #bottombar-close:hover {
            background: var(--accent-light);
            color: var(--accent);
        }
        #bottombar-details {
            font-size: 13.5px;
            color: var(--text-muted);
            line-height: 1.65;
            overflow-y: auto;
            max-height: 82px;
        }
        #bottombar-details a {
            color: var(--accent);
            text-decoration: none;
        }
        #bottombar-details a:hover {
            text-decoration: underline;
        }

        @media (max-width: 420px) {
            #header {
                padding: 0 8px;
                height: 46px;
                gap: 6px;
            }
            #header-title {
                font-size: 11px;
                max-width: 70px;
            }
            #search-input {
                font-size: 11.5px;
                padding: 6px 30px 6px 10px;
            }
            #search-input::placeholder {
                font-size: 10px;
            }
            #theme-toggle {
                padding: 3px 8px;
                font-size: 13px;
            }
            #bottombar.visible {
                padding: 10px 12px;
            }
            #bottombar-name {
                font-size: 13.5px;
            }
            #bottombar-details {
                font-size: 11.5px;
                line-height: 1.5;
            }
        }

        @media (max-width: 768px) {
            #header {
                gap: 10px;
                padding: 0 10px;
                height: 50px;
            }
            #header-title {
                font-size: 12px;
                max-width: 88px;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            #search-wrapper {
                max-width: none;
                min-width: 0;
                margin: 0;
            }
            #search-input {
                font-size: 12px;
                padding: 7px 34px 7px 12px;
            }
            #search-input::placeholder {
                font-size: 11px;
            }
            #search-dropdown {
                min-width: 0;
                width: 100%;
            }
            #theme-toggle {
                padding: 4px 10px;
                font-size: 14px;
            }
            #bottombar.visible {
                max-height: 38vh;
                padding: 12px 14px;
            }
            #bottombar-name {
                font-size: 14px;
            }
            #bottombar-details {
                font-size: 12px;
                max-height: 24vh;
            }
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--link-color); border-radius: 3px; }
    </style>
    <script src="https://d3js.org/d3.v5.min.js"></script>
</head>
<body>

<header id="header">
    <span id="header-title">मिश्रा परिवार वृक्ष</span>
    <div id="search-wrapper">
        <input id="search-input" type="text" placeholder="नाम खोजें… (Search name)"
               autocomplete="off" spellcheck="false" />
        <span id="search-icon">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.6"/>
                <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor"
                      stroke-width="1.6" stroke-linecap="round"/>
            </svg>
        </span>
        <div id="search-dropdown"></div>
    </div>
    <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">🌙</button>
</header>

<div id="tree-container">
    <div id="main-tree-panel" class="tree-panel"></div>
</div>

<svg id="spouse-connector-layer" aria-hidden="true"></svg>

<div id="bottombar">
    <div id="bottombar-header">
        <span id="bottombar-name"></span>
        <button id="bottombar-close" aria-label="Close panel">✕</button>
    </div>
    <div id="bottombar-details"></div>
</div>

<script>
    /* ── Theme (runs before paint to avoid flash) ── */
    (function() {
        var saved = localStorage.getItem('ft-theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('theme-toggle').textContent = saved === 'dark' ? '☀️' : '🌙';
    })();

    document.getElementById('theme-toggle').addEventListener('click', function() {
        var html = document.documentElement;
        var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        this.textContent = next === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('ft-theme', next);
        update(root);
        if (spouseRoot) {
            updateSpouseTree(spouseRoot);
            drawSpouseConnector(false);
        }
    });

    /* ── Data ── */

            : Math.max(mainLayout.rowSpacing * 4.8, spouseLayout.rowSpacing * 3.9, 168);
        var spouseTopOffset = 0;

        if (spouseNodes && spouseNodes.length) {
            spouseTopOffset = spouseNodes.reduce(function(minOffset, node) {
                return Math.min(minOffset, node.x - focusNode.x);
            }, 0);
        }

        var requiredFocusY = activeSpouseSourceNode.x + minimumRootOffset;
        if (lowerBound !== null) {
            requiredFocusY = Math.max(requiredFocusY, lowerBound + spouseLayout.rowSpacing * 1.8 - spouseTopOffset);
        }

        return {
            treeX: activeSpouseSourceNode.y - focusNode.y,
            treeY: requiredFocusY - focusNode.x,
            anchorX: activeSpouseSourceNode.y,
            anchorY: requiredFocusY
        };
    }

    function getConnectorPath() {
        var trigger = document.getElementById('spouse-tree-trigger');
        var placement = getSpousePlacement(spouseRoot.descendants ? spouseRoot.descendants() : null);
        if (!trigger || !spouseRoot || !placement || selectedMainNode !== activeSpouseSourceNode) {
            return null;
        }

        var triggerRect = trigger.getBoundingClientRect();
        if (!triggerRect.width) {
            return null;
        }

        var treeRect = mainContainer.getBoundingClientRect();
        var viewportTransform = d3.zoomTransform(svgEl.node());
        var endX = treeRect.left + viewportTransform.x + placement.anchorX * viewportTransform.k;
        var endY = treeRect.top + viewportTransform.y + placement.anchorY * viewportTransform.k;

        var startX = triggerRect.left + triggerRect.width / 2;
        var startY = triggerRect.top;
        var bendY = startY - Math.max(44, Math.min(96, startY - endY - 18));

        return 'M ' + startX + ' ' + startY +
            ' L ' + startX + ' ' + bendY +
            ' L ' + endX + ' ' + bendY +
            ' L ' + endX + ' ' + endY;
    }

    function hideSpouseConnector() {
        connectorLayer.selectAll('path.connector-path').remove();
    }

    function drawSpouseConnector(animate) {
        setConnectorCanvasSize();
        var pathData = getConnectorPath();
        if (!pathData) {
            hideSpouseConnector();
            return;
        }

        var connector = connectorLayer.selectAll('path.connector-path').data([pathData]);
        var connectorEnter = connector.enter().append('path').attr('class', 'connector-path');
        var connectorMerged = connectorEnter.merge(connector)
            .attr('d', pathData)
            .style('opacity', 0.95);

        connector.exit().remove();

        if (animate) {
            var totalLength = connectorMerged.node().getTotalLength();
            connectorMerged
                .attr('stroke-dasharray', totalLength + ' ' + totalLength)
                .attr('stroke-dashoffset', totalLength)
                .transition()
                .duration(380)
                .ease(d3.easeCubicOut)
                .attr('stroke-dashoffset', 0)
                .style('opacity', 0.95);
        } else {
            connectorMerged
                .attr('stroke-dasharray', null)
                .attr('stroke-dashoffset', null)
                .style('opacity', 0.95);
        }
    }

    function refreshTreesForPanelChange(keepView) {
        var prevDuration = duration;
        duration = 0;
        update(root);
        if (spouseRoot) {
            updateSpouseTree(spouseRoot);
        }
        duration = prevDuration;
        if (!keepView) {
            scheduleFit(false, 0);
        }
        drawSpouseConnector(false);
    }

    function clearSpouseTree(keepView) {
        var fadeDuration = 220;
        activeSpouseSourceNode = null;
        spouseRoot = null;
        spouseI = 0;

        gSpouse.interrupt().transition()
            .duration(fadeDuration)
            .style('opacity', 0)
            .on('end', function() {
                gSpouse.selectAll('*').remove();
                gSpouse.attr('transform', null);
                gSpouse.style('opacity', 1);
            });

        gSpouseConnector.interrupt().transition()
            .duration(fadeDuration)
            .style('opacity', 0);

        hideSpouseConnector();
        refreshTreesForPanelChange(keepView);
    }

    function hideSpouseTreeTemporarily() {
        gSpouse.attr('display', 'none');
        gSpouseConnector.style('opacity', 0);
        hideSpouseConnector();
    }

    function showSpouseTreeTemporarily() {
        gSpouse.attr('display', null);
    }

    function isMainNodeVisible(nodeRef) {
        if (!nodeRef || !root) {
            return false;
        }

        return root.descendants().some(function(node) {
            return node === nodeRef;
        });
    }

    function refreshOpenSpouseTree(sourceNode) {
        if (!spouseRoot || !activeSpouseSourceNode) {
            return;
        }

        if (!isMainNodeVisible(activeSpouseSourceNode)) {
            hideSpouseTreeTemporarily();
            return;
        }

        showSpouseTreeTemporarily();

        if (sourceNode && activeSpouseSourceNode === sourceNode && sourceNode.data.spouse) {
            spouseRoot = buildSpouseRootFromNode(sourceNode);
        }

        if (spouseRoot) {
            updateSpouseTree(spouseRoot);
            drawSpouseConnector(false);
        }
    }

    function animateSpouseTreeTransition(femaleNode, callback) {
        var layout = getLayoutConfig();
        var spouseLayout = getSpouseLayoutConfig();
        
        // Calculate positions
        var femalePos = {
            x: femaleNode.y,
            y: femaleNode.x
        };
        
        // Build spouse tree to get anchor point
        var tempSpouseRoot = buildSpouseRootFromNode(femaleNode);
        if (!tempSpouseRoot) {
            if (callback) callback();
            return;
        }
        
        applySpouseSize();
        var treeData = spouseTreeLayout(tempSpouseRoot);
        var nodes = treeData.descendants();
        var mainDepthSpacing = getLayoutConfig().depthSpacing;
        nodes.forEach(function(d) {
            d.y = d.depth * mainDepthSpacing;
        });
        
        var spousePlacement = getSpousePlacement(nodes);
        if (!spousePlacement) {
            if (callback) callback();
            return;
        }
        
        var spousePos = {
            x: spousePlacement.anchorX,
            y: spousePlacement.anchorY
        };
        
        // Create animation layer
        var animLayer = gViewport.append('g').attr('class', 'transition-animation-layer');
        
        // Create female node clone
        var femaleGroup = animLayer.append('g')
            .attr('transform', 'translate(' + femalePos.x + ',' + femalePos.y + ')');
        
        femaleGroup.append('circle')
            .attr('r', layout.nodeRadius)
            .style('fill', cssVar('--node-fill'))
            .style('stroke', cssVar('--female-color'))
            .style('stroke-width', '2.5px');
        
        femaleGroup.append('text')
            .attr('x', layout.textOffset)
            .attr('dy', '.35em')
            .style('font-size', layout.textSize + 'px')
            .style('fill', cssVar('--text'))
            .text(femaleNode.data.name);
        
        // Create spouse node clone at spouse position (starts semi-transparent)
        var spouseGroup = animLayer.append('g')
            .attr('transform', 'translate(' + spousePos.x + ',' + spousePos.y + ')')
            .style('opacity', 0.3);
        
        spouseGroup.append('circle')
            .attr('r', spouseLayout.nodeRadius)
            .style('fill', cssVar('--node-fill'))
            .style('stroke', femaleNode.data.spouse.gender === 'male' ? cssVar('--male-color') : cssVar('--female-color'))
            .style('stroke-width', '2.5px');
        
        spouseGroup.append('text')
            .attr('x', spouseLayout.textOffset)
            .attr('dy', '.35em')
            .style('font-size', spouseLayout.textSize + 'px')
            .style('fill', cssVar('--text'))
            .text(femaleNode.data.spouse.name);
        
        // Animation duration
        var animDuration = 650;
        
        // Animate female node moving to spouse position
        femaleGroup.transition()
            .duration(animDuration)
            .ease(d3.easeCubicInOut)
            .attr('transform', 'translate(' + spousePos.x + ',' + spousePos.y + ')')
            .style('opacity', 0.4)
            .on('end', function() {
                animLayer.remove();
                if (callback) callback();
            });
        
        // Animate spouse node fading in fully
        spouseGroup.transition()
            .duration(animDuration)
            .ease(d3.easeCubicInOut)
            .style('opacity', 1);
        
        // Create a dashed line that animates
        var dashLine = animLayer.append('line')
            .attr('x1', femalePos.x)
            .attr('y1', femalePos.y)
            .attr('x2', spousePos.x)
            .attr('y2', spousePos.y)
            .style('stroke', cssVar('--link-color'))
            .style('stroke-width', '1.5px')
            .style('stroke-dasharray', '5,5')
            .style('opacity', 0);
        
        dashLine.transition()
            .duration(animDuration / 3)
            .style('opacity', 0.6)
            .transition()
            .duration(animDuration * 2 / 3)
            .style('opacity', 0);
    }

    function openSpouseTreeFromSelection() {
        if (!selectedMainNode || !selectedMainNode.data || !selectedMainNode.data.spouse) {
            return;
        }

        // Hide spouse tree initially for animation
        gSpouse.style('opacity', 0);
        
        activeSpouseSourceNode = selectedMainNode;
        spouseRoot = buildSpouseRootFromNode(selectedMainNode);
        if (!spouseRoot) {
            return;
        }

        update(root);
        updateSpouseTree(spouseRoot);
        
        // Start animation
        animateSpouseTreeTransition(selectedMainNode, function() {
            // After animation, fade in the spouse tree
            gSpouse.transition()
                .duration(300)
                .ease(d3.easeQuadOut)
                .style('opacity', 1);
            
            drawSpouseConnector(true);
        });
        
        showDetails(selectedMainNode.data, selectedMainNode);
    }

    setConnectorCanvasSize();
    applySize();
    root = d3.hierarchy(data, function(d) { return d.children; });
    root.x0 = (getSize().h - margin.top - margin.bottom) / 2;
    root.y0 = 0;
    root.children.forEach(collapse);

    var initialDuration = duration;
    duration = 0;
    update(root);
    duration = initialDuration;
    scheduleFit(false, 0);

    window.addEventListener('resize', function() {
        setConnectorCanvasSize();
        applySize();
        applySpouseSize();
        var prev = duration;
        duration = 0;
        update(root);
        if (spouseRoot) {
            updateSpouseTree(spouseRoot);
        }
        duration = prev;
        scheduleFit(false, 0);
        drawSpouseConnector(false);
    });

    /* ── CSS variable reader (lets d3 use theme colours) ── */
    function cssVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    /* ── Update function ── */
    function update(source) {
        applySize();
        var treeData = treeLayout(root);
        var nodes = treeData.descendants();
        var links  = treeData.descendants().slice(1);
        var layout = getLayoutConfig();

        nodes.forEach(d => { d.y = d.depth * layout.depthSpacing; });

        var collapseClr = cssVar('--node-collapsed');
        var openFill    = cssVar('--node-fill');
        var strokeClr   = cssVar('--node-stroke');
        var textClr     = cssVar('--text');
        var linkClr     = cssVar('--link-color');
        var maleClr     = cssVar('--male-color');
        var femaleClr   = cssVar('--female-color');

        /* Nodes */
        var node = gMain.selectAll('g.node')
            .data(nodes, d => d.id || (d.id = ++i));

        var nodeEnter = node.enter().append('g')
            .attr('class', 'node')
            .attr('transform', d => 'translate(' + source.y0 + ',' + source.x0 + ')')
            .on('click', click);

        // Main person circle
        nodeEnter.append('circle')
            .attr('class', 'node-circle')
            .attr('r', 1e-6)
            .style('fill', d => {
                if (d.data.gender === 'female' && d.data.spouse && activeSpouseSourceNode === d && spouseRoot) {
                    return openFill;
                }
                if (d.data.gender === 'female' && hasExtraSpouseTreeData(d.data)) {
                    return femaleClr;
                }
                if (d._children) return cssVar('--node-collapsed');
                return openFill;
            })
            .style('stroke', d => {
                if (d.data.gender === 'male') return maleClr;
                if (d.data.gender === 'female') return femaleClr;
                return strokeClr;
            });

        // Spouse circle (if exists)
        nodeEnter.each(function(d) {
            if (d.data.spouse) {
                var spouseGroup = d3.select(this);

                spouseGroup.insert('circle', '.node-circle')
                    .attr('class', 'spouse-circle')
                    .attr('r', 1e-6)
                    .attr('cy', 0) // Starts at 0, transitions to layout.nodeRadius/2 for 50% overlap
                    .style('fill', openFill)
                    .style('stroke', d.data.spouse.gender === 'female' ? femaleClr : maleClr)
                    .style('stroke-opacity', 0.8);

                spouseGroup.append('text')
                    .attr('class', 'spouse-label')
                    .attr('x', layout.textOffset)
                    .attr('y', layout.nodeRadius * 2 + 4)
                    .attr('text-anchor', 'start')
                    .style('font-size', Math.max(layout.textSize - 1, 11) + 'px')
                    .style('fill', textClr)
                    .text(d.data.spouse.name);
            }
        });

        nodeEnter.append('text')
            .attr('class', 'node-label')
            .attr('dy', '.35em')
            .attr('x', layout.textOffset)
            .attr('text-anchor', 'start')
            .style('font-size', layout.textSize + 'px')
            .style('fill', textClr)
            .text(d => d.data.name);

        var nodeUpdate = nodeEnter.merge(node);

        nodeUpdate.transition().duration(duration)
            .attr('transform', d => 'translate(' + d.y + ',' + d.x + ')');

        nodeUpdate.select('circle.node-circle')
            .attr('r', layout.nodeRadius)
            .style('fill', d => {
                if (d.data.gender === 'female' && d.data.spouse && activeSpouseSourceNode === d && spouseRoot) {
                    return openFill;
                }
                if (d.data.gender === 'female' && hasExtraSpouseTreeData(d.data)) {
                    return femaleClr;
                }
                if (d._children) {
                    if (d.data.gender === 'male') return maleClr;
                    if (d.data.gender === 'female') return femaleClr;
                    return collapseClr;
                }
                return openFill;
            })
            .style('stroke', d => {
                if (d.data.gender === 'male') return maleClr;
                if (d.data.gender === 'female') return femaleClr;
                return strokeClr;
            })
            .attr('cursor', 'pointer');

        nodeUpdate.select('circle.spouse-circle')
            .transition().duration(duration)
            .attr('r', layout.nodeRadius)
            .attr('cy', layout.nodeRadius)
            .style('fill', openFill)
            .style('stroke', d => {
                if (d.data.spouse && d.data.spouse.gender === 'female') return femaleClr;
                if (d.data.spouse && d.data.spouse.gender === 'male') return maleClr;
                return strokeClr;
            });

        nodeUpdate.select('text.node-label')
            .attr('dy', '.35em')
            .attr('x', layout.textOffset)
            .attr('text-anchor', 'start')
            .style('font-size', layout.textSize + 'px')
            .style('fill', textClr);

        nodeUpdate.select('text.spouse-label')
            .attr('x', layout.textOffset)
            .attr('y', layout.nodeRadius * 2 + 4)
            .attr('text-anchor', 'start')
            .style('font-size', Math.max(layout.textSize - 1, 11) + 'px')
            .style('fill', textClr);

        var nodeExit = node.exit().transition().duration(duration)
            .attr('transform', d => 'translate(' + source.y + ',' + source.x + ')')
            .remove();
        nodeExit.select('circle').attr('r', 1e-6);
        nodeExit.selectAll('text').style('fill-opacity', 1e-6);

        /* Links */
        var link = gMain.selectAll('path.link')
            .data(links, d => d.id);

        var linkEnter = link.enter().insert('path', 'g')
            .attr('class', 'link')
            .style('stroke', linkClr)
            .attr('d', d => {
                var o = {x: source.x0, y: source.y0};
                return diagonal({source: o, target: o});
            });

        linkEnter.merge(link).transition().duration(duration)
            .style('stroke', linkClr)
            .attr('d', d => diagonal({source: d.parent, target: d}));

        link.exit().transition().duration(duration)
            .attr('d', d => {
                var o = {x: source.x, y: source.y};
                return diagonal({source: o, target: o});
            })
            .remove();

        nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
    }

    function updateSpouseTree(source) {
        if (!spouseRoot) {
            return;
        }

        applySpouseSize();
        var treeData = spouseTreeLayout(spouseRoot);
        var nodes = treeData.descendants();
        var links = treeData.descendants().slice(1);

            gSpouseConnector.transition()
                .duration(duration)
                .attr('d', 'M ' + activeSpouseSourceNode.y + ' ' + activeSpouseSourceNode.x + ' L ' + placement.anchorX + ' ' + placement.anchorY)

        var nodeUpdate = nodeEnter.merge(node);

        nodeUpdate.transition().duration(duration)

                return 'translate(' + d.y + ',' + d.x + ')';

        nodeUpdate.select('circle.node-circle')

            .style('stroke', linkClr)

            });

            .attr('d', function() {

    /* ── Click handler ── */
    function click(d) {
        if (d.data.gender === 'female') {
            selectedMainNode = d;
            showDetails(d.data, d);
            var closedSpouseTree = false;

            if (d.data.spouse) {
                if (activeSpouseSourceNode === d && spouseRoot) {
                    clearSpouseTree(true);
                    closedSpouseTree = true;
                } else {
                    openSpouseTreeFromSelection();
                }
            }

            if (!closedSpouseTree && isCompactViewport() && !userHasControlledViewport) {
                scheduleFit(true, duration + 40);
            }
            return;
        }

        if (d.children) {
            d._children = d.children;
            d.children  = null;
        } else {
            d.children  = d._children;
            d._children = null;
        }
        selectedMainNode = d;
        update(d);
        showDetails(d.data, d);

        refreshOpenSpouseTree(d);

        if (isCompactViewport() && !userHasControlledViewport) {
            scheduleFit(true, duration + 40);
        }
    }

    function clickSpouse(d) {
        if (d.children) {
            d._children = d.children;
            d.children = null;
        } else {
            d.children = d._children;
            d._children = null;
        }

        updateSpouseTree(d);
        scheduleFit(true, duration + 40);
    }

    /* ── Bottom panel ── */
    function showDetails(nodeData, nodeRef) {
        if (nodeRef) {
            selectedMainNode = nodeRef;
        }

        var triggerReady = !!(nodeRef && nodeRef.data && nodeRef.data.spouse);
        var spouseTreeOpen = !!(triggerReady && activeSpouseSourceNode === nodeRef && spouseRoot);
        var nameHtml = '<span>' + escHtml(nodeData.name) + '</span>';

        if (nodeData.spouse) {
            if (triggerReady) {
                nameHtml += ' &amp; <button type="button" id="spouse-tree-trigger" class="bottombar-spouse-trigger' +
                    (spouseTreeOpen ? ' is-active' : '') + '" aria-expanded="' +
                    (spouseTreeOpen ? 'true' : 'false') + '">' + escHtml(nodeData.spouse.name) + '</button>';
            } else {
                nameHtml += ' &amp; ' + escHtml(nodeData.spouse.name);
            }
        }

        document.getElementById('bottombar-name').innerHTML = nameHtml;
        var det = document.getElementById('bottombar-details');
        if (nodeData.url) {
            det.innerHTML = (nodeData.details ? escHtml(nodeData.details) + '<br><br>' : '') +
                '<a href="' + escHtml(nodeData.url) + '" target="_blank" rel="noopener noreferrer">🔗 Profile Link</a>';
        } else if (nodeData.details) {
            det.textContent = nodeData.details;
        } else {
            det.textContent = 'कोई विशेष जानकारी उपलब्ध नहीं।';
        }

        var trigger = document.getElementById('spouse-tree-trigger');
        if (trigger) {
            trigger.addEventListener('click', function() {
                if (activeSpouseSourceNode === selectedMainNode && spouseRoot) {
                    clearSpouseTree(true);
                    showDetails(selectedMainNode.data, selectedMainNode);
                    return;
                }

                openSpouseTreeFromSelection();
            });
        }

        if (spouseTreeOpen) {
            drawSpouseConnector(false);
        } else {
            hideSpouseConnector();
        }

        document.getElementById('bottombar').classList.add('visible');
    }

    document.getElementById('bottombar-close').addEventListener('click', function() {
        document.getElementById('bottombar').classList.remove('visible');
        clearSpouseTree(true);
    });

    /* ── Search ── */
    function getAllNodes(node, acc) {
        acc = acc || [];
        acc.push(node);
        (node.children  || []).forEach(c => getAllNodes(c, acc));
        (node._children || []).forEach(c => getAllNodes(c, acc));
        return acc;
    }

    function ancestorPath(node) {
        var parts = [], cur = node.parent;
        while (cur) { parts.push(cur.data.name); cur = cur.parent; }
        return parts.join(' ‹ ');
    }

    function expandToNode(node) {
        var ancs = [], cur = node.parent;
        while (cur) { ancs.push(cur); cur = cur.parent; }
        ancs.reverse().forEach(function(a) {
            if (!a.children && a._children) {
                a.children  = a._children;
                a._children = null;
            }
        });
    }

    function focusNode(node) {
        expandToNode(node);
        selectedMainNode = node;
        update(root);
        refreshOpenSpouseTree(node);
        /* After the 750 ms D3 transition, highlight and pan to centre */
        setTimeout(function() {
            gMain.selectAll('g.node').classed('node--highlighted', false);
            gMain.selectAll('g.node').each(function(d) {
                if (d === node) d3.select(this).classed('node--highlighted', true);
            });
            var s  = getSize();
            var k  = d3.zoomTransform(svgEl.node()).k;
            var tx = s.w / 2 - node.y * k;
            var ty = s.h / 2 - node.x * k;
            svgEl.transition().duration(650)
                .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(k));
        }, duration + 60);
    }

    var searchInput    = document.getElementById('search-input');
    var searchDropdown = document.getElementById('search-dropdown');

    searchInput.addEventListener('input', function() {
        var q = this.value.trim();
        searchDropdown.innerHTML = '';
        if (!q) { searchDropdown.classList.remove('open'); return; }

        var matches = getAllNodes(root).filter(n =>
            n.data.name.toLowerCase().includes(q.toLowerCase())
        );

        if (matches.length === 0) {
            searchDropdown.innerHTML = '<div class="search-empty">कोई परिणाम नहीं मिला।</div>';
        } else {
            matches.forEach(function(n) {
                var path = ancestorPath(n);
                var div  = document.createElement('div');
                div.className = 'search-item';
                div.innerHTML =
                    '<div>' + escHtml(n.data.name) + '</div>' +
                    (path ? '<div class="search-item-path">' + escHtml(path) + '</div>' : '');
                div.addEventListener('click', function() {
                    searchInput.value = n.data.name;
                    searchDropdown.classList.remove('open');
                    focusNode(n);
                    showDetails(n.data, n);
                });
                searchDropdown.appendChild(div);
            });
        }
        searchDropdown.classList.add('open');
    });

    /* Close dropdown on outside click */
    document.addEventListener('click', function(e) {
        if (!document.getElementById('search-wrapper').contains(e.target)) {
            searchDropdown.classList.remove('open');
        }
    });

    function escHtml(s) {
        if (!s) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g,  '&lt;')
            .replace(/>/g,  '&gt;')
            .replace(/"/g,  '&quot;');
    }
</script>
</body>
