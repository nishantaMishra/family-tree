<!DOCTYPE html>
<html lang="hi" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miśrā Family Chart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f5f0;
            --surface: #ffffff;
            --accent: #5b4fcf;
            --accent-light: #eeebfc;
            --text: #1a1a2a;
            --text-muted: #6b6b80;
            --link-color: #b0a8d8;
            --header-bg: rgba(255,255,255,0.92);
            --header-border: rgba(91,79,207,0.12);
            --node-fill: #ffffff;
            --node-collapsed: #5b4fcf;
            --node-stroke: #5b4fcf;
            --node-highlight: #e96c2f;
            --shadow: rgba(91,79,207,0.10);
            --shadow-sm: rgba(0,0,0,0.06);
            --dropdown-shadow: 0 8px 28px rgba(0,0,0,0.14);
            --bottombar-bg: #ffffff;
            --bottombar-border: rgba(91,79,207,0.15);
            --input-bg: #f2f0fc;
            --input-border: rgba(91,79,207,0.25);
        }
        [data-theme="dark"] {
            --bg: #0f0f1a;
            --surface: #1a1a2e;
            --accent: #8b7fe8;
            --accent-light: #25224a;
            --text: #e4e4f0;
            --text-muted: #8888a0;
            --link-color: #30285c;
            --header-bg: rgba(15,15,26,0.93);
            --header-border: rgba(139,127,232,0.18);
            --node-fill: #1a1a2e;
            --node-collapsed: #7c6fe0;
            --node-stroke: #8b7fe8;
            --node-highlight: #f0824a;
            --shadow: rgba(139,127,232,0.18);
            --shadow-sm: rgba(0,0,0,0.35);
            --dropdown-shadow: 0 8px 28px rgba(0,0,0,0.50);
            --bottombar-bg: #1a1a2e;
            --bottombar-border: rgba(139,127,232,0.20);
            --input-bg: #14132a;
            --input-border: rgba(139,127,232,0.35);
        }
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            transition: background-color 0.3s, color 0.3s;
        }
        body {
            font-family: 'Noto Sans Devanagari', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        #header {
            position: relative;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 0 24px;
            height: 58px;
            background: var(--header-bg);
            border-bottom: 1px solid var(--header-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            flex-shrink: 0;
            box-shadow: 0 1px 8px var(--shadow);
        }
        #header-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--accent);
            white-space: nowrap;
            letter-spacing: 0.01em;
        }

        /* ── Search ── */
        #search-wrapper {
            position: relative;
            flex: 1;
            max-width: 380px;
            margin: 0 auto;
        }
        #search-input {
            width: 100%;
            padding: 8px 38px 8px 14px;
            border-radius: 22px;
            border: 1.5px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text);
            font-family: 'Noto Sans Devanagari', Arial, sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--shadow);
        }
        #search-input::placeholder {
            color: var(--text-muted);
            font-size: 13px;
        }
        #search-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            display: flex;
        }
        #search-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            width: 100%;
            min-width: 240px;
            background: var(--surface);
            border: 1px solid var(--input-border);
            border-radius: 14px;
            box-shadow: var(--dropdown-shadow);
            overflow: hidden;
            max-height: 260px;
            overflow-y: auto;
            z-index: 300;
        }
        #search-dropdown.open {
            display: block;
        }
        .search-item {
            padding: 10px 16px;
            cursor: pointer;
            font-size: 13.5px;
            color: var(--text);
            border-bottom: 1px solid var(--header-border);
            transition: background 0.12s;
        }
        .search-item:last-child {
            border-bottom: none;
        }
        .search-item:hover {
            background: var(--accent-light);
        }
        .search-item-path {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .search-empty {
            padding: 14px 16px;
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
        }

        /* ── Theme toggle ── */
        #theme-toggle {
            flex-shrink: 0;
            background: var(--input-bg);
            border: 1.5px solid var(--input-border);
            border-radius: 22px;
            padding: 5px 13px;
            cursor: pointer;
            font-size: 15px;
            color: var(--text);
            transition: border-color 0.2s, transform 0.12s;
            line-height: 1.6;
        }
        #theme-toggle:hover {
            border-color: var(--accent);
            transform: scale(1.06);
        }

        /* ── Tree container ── */
        #tree-container {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: var(--bg);
            transition: background-color 0.3s;
        }
        #tree-svg {
            display: block;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        #tree-svg:active {
            cursor: grabbing;
        }

        /* ── D3 nodes & links ── */
        .node {
            cursor: pointer;
        }
        .node circle {
            stroke-width: 2.5px;
        }
        .node text {
            font: 13px 'Noto Sans Devanagari', Arial, sans-serif;
            pointer-events: none;
        }
        .link {
            fill: none;
            stroke-opacity: 0.45;
            stroke-width: 1.5px;
        }

        /* ── Search highlight ── */
        .node--highlighted circle {
            stroke-width: 4px !important;
            animation: pulse 1.6s ease-in-out 3;
        }
        @keyframes pulse {
            0%   { filter: drop-shadow(0 0 0 transparent); }
            50%  { filter: drop-shadow(0 0 9px var(--node-highlight)); }
            100% { filter: drop-shadow(0 0 0 transparent); }
        }

        /* ── Bottom panel ── */
        #bottombar {
            flex-shrink: 0;
            position: relative;
            z-index: 100;
            background: var(--bottombar-bg);
            border-top: 1px solid var(--bottombar-border);
            box-shadow: 0 -4px 18px var(--shadow);
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.35s ease, padding 0.3s ease, opacity 0.3s;
        }
        #bottombar.visible {
            max-height: 148px;
            padding: 14px 24px;
            opacity: 1;
        }
        #bottombar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        #bottombar-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent);
        }
        #bottombar-close {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: var(--text-muted);
            padding: 2px 8px;
            border-radius: 6px;
            transition: background 0.15s, color 0.15s;
            line-height: 1;
        }
        #bottombar-close:hover {
            background: var(--accent-light);
            color: var(--accent);
        }
        #bottombar-details {
            font-size: 13.5px;
            color: var(--text-muted);
            line-height: 1.65;
            overflow-y: auto;
            max-height: 82px;
        }
        #bottombar-details a {
            color: var(--accent);
            text-decoration: none;
        }
        #bottombar-details a:hover {
            text-decoration: underline;
        }

        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--link-color); border-radius: 3px; }
    </style>
    <script src="https://d3js.org/d3.v5.min.js"></script>
</head>
<body>

<header id="header">
    <span id="header-title">मिश्रा परिवार वृक्ष</span>
    <div id="search-wrapper">
        <input id="search-input" type="text" placeholder="नाम खोजें… (Search name)"
               autocomplete="off" spellcheck="false" />
        <span id="search-icon">
            <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
                <circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.6"/>
                <line x1="10.5" y1="10.5" x2="14" y2="14" stroke="currentColor"
                      stroke-width="1.6" stroke-linecap="round"/>
            </svg>
        </span>
        <div id="search-dropdown"></div>
    </div>
    <button id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">🌙</button>
</header>

<div id="tree-container"></div>

<div id="bottombar">
    <div id="bottombar-header">
        <span id="bottombar-name"></span>
        <button id="bottombar-close" aria-label="Close panel">✕</button>
    </div>
    <div id="bottombar-details"></div>
</div>

<script>

    (function() {
        var saved = localStorage.getItem('ft-theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
        document.getElementById('theme-toggle').textContent = saved === 'dark' ? '☀️' : '🌙';
    })();

    document.getElementById('theme-toggle').addEventListener('click', function() {
        var html = document.documentElement;
        var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';

        this.textContent = next === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('ft-theme', next);
        update(root);
    });

 "\u092a\u094d\u0930\u0947\u0930\u0923\u093e", "url": "https://www.instagram.com/mishraprerna269/"}, {"name": "\u0928\u093f\u0936\u093e\u0928\u094d\u0924 \u092e\u093f\u0936\u094d\u0930\u093e"}]}, {"name": "\u0906\u0936\u093f\u0937 \u0915\u0941\u092e\u093e\u0930 \u092e\u093f\u0936\u094d\u0930\u093e"}]}]}, {"name": "\u0930\u093e\u092e \u0906\u0936\u094d\u0930\u092f \u092e\u093f\u0936\u094d\u0930\u093e", "children": [{"name": "\u0930\u093e\u092e \u092a\u094d\u0930\u0938\u093e\u0926 \u092e\u093f\u0936\u094d\u0930\u093e", "children": [{"name": "\u0905\u0936\u094b\u0915 \u0915\u0941\u092e\u093e\u0930 (\u092e\u0941\u0928\u094d\u0928\u0942) \u092e\u093f\u0936\u094d\u0930\u093e", "children": [{"name": "\u0917\u0941\u0932\u093e\u0935 (\u0938\u093f\u0923\u094d\u091f\u0942) \u092e\u093f\u0936\u094d\u0930\u093e"}, {"name": "\u091f\u093f\u0919\u094d\u0915\u0932"}]}, {"name": "\u092e\u0928\u094b\u091c \u092e\u093f\u0936\u094d\u0930\u093e", "children": [{"name": "\u0967(\u092a\u0941\u0924\u094d\u0930\u0940)"}, {"name": "\u0968(\u092a\u0941\u0924\u094d\u0930\u0940)"}, {"name": "\u0969(\u092a\u0941\u0924\u094d\u0930\u0940)"}, {"name": "\u0926\u0940\u092a\u0942 \u092e\u093f\u0936\u094d\u0930\u093e"}]}, {"name": "\u092a\u094d\u0930\u0926\u0940\u092a \u092e\u093f\u0936\u094d\u0930\u093e (\u091b\u094b\u091f\u0915\u094c)", "children": [{"name": "\u092a\u094d\u0930\u093e\u0902\u0936\u0941"}, {"name": "\u0905\u0902\u0936"}]}, {"name": "\u0917\u0941\u0921\u094d\u0921\u0928\u094d"}, {"name": "\u0915\u0930\u0941\u0923\u093e"}, {"name": "\u092a\u0941\u0937\u094d\u092a\u093e"}, {"name": "\u0938\u0941\u0927\u093e"}]}, {"name": "\u0938\u093e\u0935\u093f\u0924\u094d\u0930\u0940"}]}, {"name": "\u0928\u093e\u0930\u093e\u092f\u0923 \u0926\u0940\u0928 \u092e\u093f\u0936\u094d\u0930\u093e", "children": [{"name": "\u0938\u0924\u0940\u0936 \u092e\u093f\u0936\u094d\u0930\u093e", "children": [{"name": "\u0928\u0940\u0932\u0942"}, {"name": "\u0930\u0947\u0916\u093e"}, {"name": " \u092e\u093e\u0927\u0941\u0930\u0940 (\u0917\u0941\u0921\u094d\u0921\u0940)"}]}, {"name": "\u0915\u0947\u0936\u0935", "children": [{"name": "\u0905\u091c\u0940\u0924\u093e (\u0930\u093e\u0928\u0940)"}, {"name": "\u0905\u091c\u092f (\u0917\u0941\u0921\u094d\u0921\u0942)"}, {"name": "\u0905\u091c\u0940\u0924 (\u0905\u091c\u094d\u091c\u0942)"}]}, {"name": "\u0926\u093f\u0935\u093e\u0915\u0930 \u092e\u093f\u0936\u094d\u0930\u093e", "details": "\u0909\u092e\u093e\u0926\u0947\u0935\u0940 \u092e\u093f\u0936\u094d\u0930\u093e \u0938\u0947 \u0935\u093f\u0935\u093e\u0939\u093f\u0924\u0964", "children": [{"name": "\u0935\u093f\u091c\u092f \u0915\u0941\u092e\u093e\u0930(\u092c\u093f\u091c\u094d\u091c\u0942) \u092e\u093f\u0936\u094d\u0930\u093e", "details": "\u0938\u0930\u093f\u0924\u093e \u092e\u093f\u0936\u094d\u0930\u093e \u0938\u0947 \u0935\u093f\u0935\u093e\u0939\u093f\u0924\u0964", "children": [{"name": "\u0936\u0941\u092d\u092e\u094d \u092e\u093f\u0936\u094d\u0930\u093e", "details": "\u0905\u0928\u094d\u0928\u092a\u0942\u0930\u094d\u0923\u093e \u0924\u093f\u0935\u093e\u0930\u0940 \u0938\u0947 \u0935\u093f\u0935\u093e\u0939\u093f\u0924 \u0939\u0941\u0906\u0964 \u0905\u0928\u094d\u0928\u092a\u0942\u0930\u094d\u0923\u093e(\u092a\u094d\u0930\u093e\u091a\u0940) \u0936\u094d\u0930\u0940 \u0915\u092e\u0932\u0947\u0936 \u0924\u0925\u093e \u0936\u094d\u0930\u0940\u092e\u0924\u093f \u090a\u0937\u093e \u0924\u093f\u0935\u093e\u0930\u0940 \u0915\u093e \u092a\u0941\u0924\u094d\u0930\u0940 \u0939\u0948\u0902\u0964"}]}, {"name": "\u0968"}, {"name": "\u0969"}, {"name": "\u096a"}, {"name": "\u096b"}]}]}]}, {"name": "\u092d\u0917\u0935\u093e\u0928\u092a\u094d\u0930\u0938\u093e\u0926 \u092e\u093f\u0936\u094d\u0930\u093e", "details": "\u0906\u0915\u093e\u0936\u0940\u092f \u092c\u093f\u091c\u0932\u0940 \u0915\u0940 \u091a\u092a\u0947\u091f \u092e\u0947\u0902 \u0906\u0928\u0947 \u0938\u0947 \u0907\u0928\u0915\u0940 \u0905\u0938\u092e\u092f \u092e\u0943\u0924\u094d\u092f\u0941 \u0939\u094b \u0917\u092f\u0940 \u0925\u0940\u0964"}]};

    /* ── SVG / Zoom setup ── */
    var margin = {top: 40, right: 160, bottom: 40, left: 160};
    var container = document.getElementById('tree-container');

    var svgEl = d3.select('#tree-container').append('svg')
        .attr('id', 'tree-svg')
        .attr('width', '100%')
        .attr('height', '100%');

    var zoom = d3.zoom()
        .scaleExtent([0.12, 3.5])
        .on('zoom', function() {
            gMain.attr('transform', d3.event.transform);
        });

    svgEl.call(zoom).on('dblclick.zoom', null);

    var gMain = svgEl.append('g');

    /* ── Tree layout ── */
    var i = 0, duration = 750, root;
    var treeLayout = d3.tree();
    var diagonal = d3.linkHorizontal().x(d => d.y).y(d => d.x);

    function getSize() {
        return {
            w: container.clientWidth  || window.innerWidth,
            h: container.clientHeight || window.innerHeight
        };
    }

    function applySize() {
        var s = getSize();
        treeLayout.size([
            s.h - margin.top  - margin.bottom,
            s.w - margin.left - margin.right
        ]);
    }

    applySize();

    root = d3.hierarchy(data, d => d.children);
    root.x0 = (getSize().h - margin.top - margin.bottom) / 2;
    root.y0 = 0;

    function collapse(d) {
        if (d.children) {
            d._children = d.children;
            d._children.forEach(collapse);
            d.children = null;
        }
    }

    root.children.forEach(collapse);

    /* Place root near top-left margin on first render */
    svgEl.call(zoom.transform, d3.zoomIdentity.translate(margin.left, margin.top));
    update(root);

    window.addEventListener('resize', function() {
        applySize();
        var prev = duration;
        duration = 0;
        update(root);
        duration = prev;
    });

    /* ── CSS variable reader (lets d3 use theme colours) ── */
    function cssVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    /* ── Update function ── */
    function update(source) {
        applySize();
        var treeData = treeLayout(root);
        var nodes = treeData.descendants();
        var links  = treeData.descendants().slice(1);

        nodes.forEach(d => { d.y = d.depth * 210; });

        var collapseClr = cssVar('--node-collapsed');
        var openFill    = cssVar('--node-fill');
        var strokeClr   = cssVar('--node-stroke');
        var textClr     = cssVar('--text');
        var linkClr     = cssVar('--link-color');

        /* Nodes */
        var node = gMain.selectAll('g.node')
            .data(nodes, d => d.id || (d.id = ++i));

        var nodeEnter = node.enter().append('g')
            .attr('class', 'node')
            .attr('transform', d => 'translate(' + source.y0 + ',' + source.x0 + ')')
            .on('click', click);

        nodeEnter.append('circle')
            .attr('class', 'node')
            .attr('r', 1e-6)
            .style('fill',   d => d._children ? collapseClr : openFill)
            .style('stroke', d => d._children ? collapseClr : strokeClr);

        nodeEnter.append('text')
            .attr('dy', '.35em')
            .attr('x', 17)
            .attr('text-anchor', 'start')
            .style('fill', textClr)
            .text(d => d.data.name);

        var nodeUpdate = nodeEnter.merge(node);

        nodeUpdate.transition().duration(duration)
            .attr('transform', d => 'translate(' + d.y + ',' + d.x + ')');

        nodeUpdate.select('circle.node')
            .attr('r', 12)
            .style('fill',   d => d._children ? collapseClr : openFill)
            .style('stroke', d => d._children ? collapseClr : strokeClr)
            .attr('cursor', 'pointer');

        nodeUpdate.select('text')
            .attr('x', 17)
            .attr('text-anchor', 'start')
            .style('fill', textClr);

        var nodeExit = node.exit().transition().duration(duration)
            .attr('transform', d => 'translate(' + source.y + ',' + source.x + ')')
            .remove();
        nodeExit.select('circle').attr('r', 1e-6);
        nodeExit.select('text').style('fill-opacity', 1e-6);

        /* Links */
        var link = gMain.selectAll('path.link')
            .data(links, d => d.id);

        var linkEnter = link.enter().insert('path', 'g')
            .attr('class', 'link')
            .style('stroke', linkClr)
            .attr('d', d => {
                var o = {x: source.x0, y: source.y0};
                return diagonal({source: o, target: o});
            });

        linkEnter.merge(link).transition().duration(duration)
            .style('stroke', linkClr)
            .attr('d', d => diagonal({source: d.parent, target: d}));

        link.exit().transition().duration(duration)
            .attr('d', d => {
                var o = {x: source.x, y: source.y};
                return diagonal({source: o, target: o});
            })
            .remove();

        nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
    }

    /* ── Click handler ── */
    function click(d) {
        if (d.children) {
            d._children = d.children;
            d.children  = null;
        } else {
            d.children  = d._children;
            d._children = null;
        }
        update(d);
        showDetails(d.data);
    }

    /* ── Bottom panel ── */
    function showDetails(nodeData) {
        document.getElementById('bottombar-name').textContent = nodeData.name;
        var det = document.getElementById('bottombar-details');
        if (nodeData.url) {
            det.innerHTML = (nodeData.details ? escHtml(nodeData.details) + '<br><br>' : '') +
                '<a href="' + escHtml(nodeData.url) + '" target="_blank" rel="noopener noreferrer">🔗 Profile Link</a>';
        } else if (nodeData.details) {
            det.textContent = nodeData.details;
        } else {
            det.textContent = 'कोई विशेष जानकारी उपलब्ध नहीं।';
        }
        document.getElementById('bottombar').classList.add('visible');
    }

    document.getElementById('bottombar-close').addEventListener('click', function() {
        document.getElementById('bottombar').classList.remove('visible');
    });

    /* ── Search ── */
    function getAllNodes(node, acc) {
        acc = acc || [];
        acc.push(node);
        (node.children  || []).forEach(c => getAllNodes(c, acc));
        (node._children || []).forEach(c => getAllNodes(c, acc));
        return acc;
    }

    function ancestorPath(node) {
        var parts = [], cur = node.parent;
        while (cur) { parts.unshift(cur.data.name); cur = cur.parent; }
        return parts.join(' › ');
    }

    function expandToNode(node) {
        var ancs = [], cur = node.parent;
        while (cur) { ancs.push(cur); cur = cur.parent; }
        ancs.reverse().forEach(function(a) {
            if (!a.children && a._children) {
                a.children  = a._children;
                a._children = null;
            }
        });
    }

    function focusNode(node) {
        expandToNode(node);
        update(root);
        /* After the 750 ms D3 transition, highlight and pan to centre */
        setTimeout(function() {
            gMain.selectAll('g.node').classed('node--highlighted', false);
            gMain.selectAll('g.node').each(function(d) {
                if (d === node) d3.select(this).classed('node--highlighted', true);
            });
            var s  = getSize();
            var k  = d3.zoomTransform(svgEl.node()).k;
            var tx = s.w / 2 - node.y * k;
            var ty = s.h / 2 - node.x * k;
            svgEl.transition().duration(650)
                .call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(k));
        }, duration + 60);
    }

    var searchInput    = document.getElementById('search-input');
    var searchDropdown = document.getElementById('search-dropdown');

    searchInput.addEventListener('input', function() {
        var q = this.value.trim();
        searchDropdown.innerHTML = '';
        if (!q) { searchDropdown.classList.remove('open'); return; }

        var matches = getAllNodes(root).filter(n =>
            n.data.name.toLowerCase().includes(q.toLowerCase())
        );

        if (matches.length === 0) {
            searchDropdown.innerHTML = '<div class="search-empty">कोई परिणाम नहीं मिला।</div>';
        } else {
            matches.forEach(function(n) {
                var path = ancestorPath(n);
                var div  = document.createElement('div');
                div.className = 'search-item';
                div.innerHTML =
                    '<div>' + escHtml(n.data.name) + '</div>' +
                    (path ? '<div class="search-item-path">' + escHtml(path) + '</div>' : '');
                div.addEventListener('click', function() {
                    searchInput.value = n.data.name;
                    searchDropdown.classList.remove('open');
                    focusNode(n);
                    showDetails(n.data);
                });
                searchDropdown.appendChild(div);
            });
        }
        searchDropdown.classList.add('open');
    });

    /* Close dropdown on outside click */
    document.addEventListener('click', function(e) {
        if (!document.getElementById('search-wrapper').contains(e.target)) {
            searchDropdown.classList.remove('open');
        }
    });

    function escHtml(s) {
        if (!s) return '';
        return String(s)
            .replace(/&/g, '&amp;')
            .replace(/</g,  '&lt;')
            .replace(/>/g,  '&gt;')
            .replace(/"/g,  '&quot;');
    }
</script>
